<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用語変換 - 3分10秒_HR&D</title>
    <style>
        body {
            background: radial-gradient(circle, #2c1e14 0%, #000 100%);
            color: #ffd700;
            font-family: "MS Ｐ明朝", "MS Mincho", serif;
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        #game-container { position: relative; width: 100%; max-width: 900px; height: 100%; text-align: center; }
        .title { font-size: 3.5rem; margin-top: 5vh; text-shadow: 0 0 20px #b8860b; letter-spacing: 0.5rem; }
        
        /* キャラクター画像の設定 */
        #character-img { 
            height: 40vh; 
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.4)); 
            transition: 0.4s;
            object-fit: contain;
        }

        .question-box { 
            font-size: 1.2rem; 
            margin: 10px auto; 
            min-height: 5rem; 
            color: #fff; 
            width: 90%; 
            line-height: 1.4; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(255,255,255,0.05); 
            border-radius: 10px; 
            padding: 15px; 
            box-sizing: border-box; 
        }

        #feedback { 
            font-size: 1.4rem; 
            height: 2.2rem; 
            margin: 5px 0; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px #000;
        }

        .input-area { 
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }

        input[type="text"] { 
            background: rgba(0,0,0,0.7); 
            border: 2px solid #ffd700; 
            color: #fff; 
            padding: 12px; 
            font-size: 1.5rem; 
            width: 50%; 
            text-align: center; 
            border-radius: 5px; 
        }

        /* 名前入力用のスタイル */
        #user-name {
            font-size: 1.2rem;
            width: 250px;
            margin-bottom: 20px;
            border: 1px solid #ffd700;
        }

        button { 
            background: linear-gradient(45deg, #ffd700, #b8860b); 
            border: none; 
            padding: 10px 25px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            font-weight: bold; 
            margin: 5px; 
            color: #000; 
            border-radius: 5px; 
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px #ffd700; }

        .ui-btn { position: absolute; bottom: 20px; font-size: 0.8rem; background: #333; color: #ffd700; border: 1px solid #ffd700; padding: 5px 15px; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .zukan-list { width: 85%; height: 70%; overflow-y: auto; text-align: left; border: 1px solid #ffd700; padding: 20px; background: rgba(20,10,5,0.8); }
        .zukan-item { margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 8px; }
        
        #rank-display { font-size: 2.2rem; font-weight: bold; color: #ff0; text-shadow: 0 0 10px #f00; margin: 10px 0; }
        .ranking-table { margin: 10px auto; color: #fff; border-collapse: collapse; width: 90%; font-size: 0.9rem; }
        .ranking-table th, .ranking-table td { border-bottom: 1px solid #ffd700; padding: 8px; text-align: center; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<audio id="bgm" src="世界に楽しいを届けて(カスタマイズ).mp3" loop></audio>
<audio id="se-correct" src="クイズ正解1.mp3"></audio>
<audio id="se-wrong" src="クイズ不正解1.mp3"></audio>

<div id="game-container">
    <div id="start-screen">
        <h1 class="title">用語変換</h1>
        <img src="3分10秒_HR&D.png" style="height: 45vh; margin-bottom: 10px;">
        <div>
            <input type="text" id="user-name" placeholder="名前を入力してください" autocomplete="off">
        </div>
        <button onclick="startGame()" style="font-size: 2rem; padding: 10px 50px;">START</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="question-text" class="question-box"></div>
        <div id="feedback"></div>
        <img id="character-img" src="3分10秒_HR&D_真剣.png">
        
        <div class="input-area">
            <input type="text" id="answer-input" autocomplete="off" placeholder="変換後の用語を入力">
            <button onclick="checkAnswer()">変換</button>
        </div>
        
        <button class="ui-btn" style="left: 20px;" onclick="toggleZukan(true)">図鑑</button>
        <button class="ui-btn" style="right: 20px;" onclick="showHint()">ヒント</button>
    </div>

    <div id="result-screen" class="hidden">
        <h1 class="title">RESULT</h1>
        <div id="rank-display"></div>
        <div id="final-stats" style="font-size: 1.2rem; color: #fff; line-height: 1.5;"></div>
        <h3 style="margin-top: 15px;">TOP RECORDS</h3>
        <table class="ranking-table" id="ranking-body"></table>
        <button onclick="location.reload()">タイトルへ</button>
    </div>
</div>

<div id="zukan-overlay" class="overlay">
    <h2 style="color: #ffd700;">用語変換 図鑑</h2>
    <div class="zukan-list" id="zukan-content"></div>
    <button onclick="toggleZukan(false)" style="margin-top: 20px;">閉じる</button>
</div>

    let currentQuestions = [];
    let currentIndex = 0;
    let playerName = "名無し";
    let stats = { start: 0, hints: 0, giveUps: 0, misCount: 0 };

    function playBGM() { 
        const b = document.getElementById('bgm'); 
        b.volume = 0.3; 
        b.load();
        b.play().catch(e=>{}); 
    }
    function playSE(id) { const s = document.getElementById(id); s.currentTime = 0; s.play(); }

    function startGame() {
        // 名前を保存
        const inputName = document.getElementById('user-name').value.trim();
        if (inputName) playerName = inputName;

        playBGM();
        currentQuestions = [...masterData].sort(() => 0.5 - Math.random()).slice(0, 5);
        stats = { start: Date.now(), hints: 0, giveUps: 0, misCount: 0 };
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        initZukan();
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('character-img').src = "3分10秒_HR&D_真剣.png";
        document.getElementById('feedback').innerText = "";
        document.getElementById('answer-input').value = "";
        document.getElementById('answer-input').focus();
        stats.misCount = 0;
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.trim();
        const q = currentQuestions[currentIndex];
        if (input === q.a) {
            playSE('se-correct');
            document.getElementById('character-img').src = "3分10秒_HR&D_照れ.png";
            document.getElementById('feedback').innerHTML = `<span style="color:#0f0">〇 正解!</span> ${q.en}`;
            setTimeout(next, 1500);
        } else {
            playSE('se-wrong');
            stats.misCount++;
            document.getElementById('character-img').src = "3分10秒_HR&D_切ない.png";
            document.getElementById('feedback').innerHTML = `<span style="color:#f00">× 不正解</span>`;
            if (stats.misCount >= 7) {
                stats.giveUps++;
                document.getElementById('feedback').innerHTML = `<span style="color:#ffd700">正解: ${q.a}</span>`;
                setTimeout(next, 2000);
            }
        }
    }

    function next() {
        currentIndex++;
        if (currentIndex < 5) showQuestion(); else showResult();
    }

    function showResult() {
        const time = ((Date.now() - stats.start) / 1000).toFixed(2);
        const score = Math.max(0, 10000 - (time * 50) - (stats.hints * 200) - (stats.giveUps * 1000));
        let rank = "称号: 用語変換の徒";
        if (score > 9000) rank = "称号: 真理の到達者";
        else if (score > 7000) rank = "称号: 熟練の変換師";
        else if (score > 4000) rank = "称号: 駆け出しの賢者";
        
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('rank-display').innerText = rank;
        document.getElementById('final-stats').innerHTML = `プレーヤー: ${playerName}<br>Time: ${time}s | Hint: ${stats.hints} | GiveUp: ${stats.giveUps}`;
        updateRanking(time, rank);
    }

    function updateRanking(time, rank) {
        let records = JSON.parse(localStorage.getItem('tr_ranking') || "[]");
        records.push({ 
            name: playerName,
            time: parseFloat(time), 
            rank: rank.replace("称号: ", ""), 
            date: new Date().toLocaleDateString() 
        });
        records.sort((a, b) => a.time - b.time);
        records = records.slice(0, 5);
        localStorage.setItem('tr_ranking', JSON.stringify(records));

        // ランキングテーブルの表示
        document.getElementById('ranking-body').innerHTML = `<tr><th>順位</th><th>名前</th><th>タイム</th><th>称号</th></tr>` + 
            records.map((r, i) => `<tr><td>${i+1}位</td><td>${r.name}</td><td>${r.time}s</td><td>${r.rank}</td></tr>`).join('');
    }

    function showHint() { 
        const q = currentQuestions[currentIndex];
        stats.hints++; 
        alert("【ヒント】\n・" + q.hints.join("\n・")); 
    }
    
    function toggleZukan(s) { document.getElementById('zukan-overlay').style.display = s ? 'flex' : 'none'; }
    
    function initZukan() {
        document.getElementById('zukan-content').innerHTML = masterData.map(d => `
            <div class="zukan-item"><strong>${d.a}</strong> (${d.en})<br><small style="color:#bbb;">${d.hints[0]}</small></div>
        `).join('');
    }

    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const quizVisible = !document.getElementById('quiz-screen').classList.contains('hidden');
            const startVisible = !document.getElementById('start-screen').classList.contains('hidden');
            if (quizVisible) checkAnswer();
            else if (startVisible) startGame();
        }
    });
</script>
